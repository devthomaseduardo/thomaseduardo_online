  <style>
    /* Splash (pre-hydration) */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    .splash-terminal {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
    }

    .splash-percent {
      font-size: 48px;
      font-weight: 300;
      color: #F5F5F7;
      letter-spacing: -0.04em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      line-height: 1;
    }

    .splash-percent span {
      font-size: 16px;
      color: rgba(255,255,255,0.2);
      margin-top: 6px;
      font-weight: 400;
    }

    .splash-logs {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      height: 48px;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
    }

    .splash-log-line {
      white-space: nowrap;
      animation: log-in 0.2s ease-out;
    }
    
    @keyframes log-in {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-progress-bar {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .splash-progress-fill {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      background: #F5F5F7;
      width: 0%;
      transform: translateX(-50%);
      transition: width 0.1s linear;
    }

    #splash.splash-exit {
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 400ms ease, transform 400ms ease;
      pointer-events: none;
    }
  </style>
</head>

<body class="antialiased bg-background text-foreground transition-colors duration-300">

  <div id="splash" role="status" aria-live="polite" aria-label="Carregando o site">
    <div class="splash-terminal">
      <div class="splash-percent" id="splash-pct">00<span>%</span></div>
      <div class="splash-progress-bar">
        <div class="splash-progress-fill" id="splash-fill"></div>
      </div>
      <div class="splash-logs" id="splash-logs"></div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      var splash = document.getElementById('splash');
      if (!splash) return;

      var logsContainer = document.getElementById('splash-logs');
      var pctText = document.getElementById('splash-pct');
      var fillBar = document.getElementById('splash-fill');

      var logs = [
        "Iniciando rotinas de sistema",
        "Carregando pacotes essenciais",
        "Resolvendo dependências UI",
        "Montando ambiente virtual",
        "Sincronizando estado",
        "Preparando renderização",
        "Ambiente pronto"
      ];

      var isAdmin = /^\/admin(\/|$)/i.test(window.location.pathname || '');
      var MIN_MS = isAdmin ? 200 : 1200;
      var MAX_MS = isAdmin ? 3000 : 4000;
      var startedAt = Date.now();
      var removed = false;
      var currentLog = 0;
      var progress = 0;

      var interval = setInterval(function() {
        progress += (Math.random() * 8) + 2;
        if (progress > 99) progress = 99;
        
        pctText.innerHTML = Math.floor(progress).toString().padStart(2, '0') + '<span>%</span>';
        fillBar.style.width = progress + '%';

        if (Math.random() > 0.5 && currentLog < logs.length - 1) {
          var div = document.createElement('div');
          div.className = 'splash-log-line';
          div.innerText = logs[currentLog++];
          logsContainer.prepend(div);
        }
      }, 70);

      function removeSplash() {
        if (removed) return;
        removed = true;
        clearInterval(interval);
        pctText.innerHTML = '100<span>%</span>';
        fillBar.style.width = '100%';
        
        var div = document.createElement('div');
        div.className = 'splash-log-line';
        div.innerText = logs[logs.length - 1];
        logsContainer.prepend(div);

        setTimeout(function() {
          splash.classList.add('splash-exit');
          window.setTimeout(function () {
            try { splash.remove(); } catch (e) { }
          }, 500);
        }, 300);
      }

      function tryFinish() {
        var elapsed = Date.now() - startedAt;
        if (elapsed >= MIN_MS) removeSplash();
        else window.setTimeout(removeSplash, Math.max(0, MIN_MS - elapsed));
      }

      window.addEventListener('app:ready', tryFinish, { once: true });
      window.setTimeout(removeSplash, MAX_MS);
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
