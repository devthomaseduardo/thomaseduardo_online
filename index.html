    <style>
      /* Splash (pre-hydration) */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #050505;
        color: rgba(255, 255, 255, 0.92);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #splash::before {
        content: "";
        position: absolute;
        inset: -40%;
        background:
          radial-gradient(closest-side at 20% 30%, rgba(59, 130, 246, 0.22), transparent 60%),
          radial-gradient(closest-side at 80% 40%, rgba(37, 99, 235, 0.18), transparent 62%),
          radial-gradient(closest-side at 55% 80%, rgba(16, 185, 129, 0.10), transparent 65%);
        filter: blur(40px);
        transform: translate3d(0, 0, 0);
        animation: splash-float 6.5s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes splash-float {
        from { transform: translate3d(-2%, -1%, 0) scale(1.02); opacity: 0.9; }
        to { transform: translate3d(2%, 1%, 0) scale(1.08); opacity: 1; }
      }

      .splash-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.32;
        filter: saturate(1) contrast(1) brightness(1.05);
        transform: scale(1.03);
      }

      .splash-inner {
        position: relative;
        z-index: 1;
        width: min(720px, calc(100% - 48px));
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }

      .splash-title {
        font-family: "Syne", system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: clamp(18px, 2.4vw, 22px);
        color: rgba(255, 255, 255, 0.9);
      }

      .splash-sub {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }

      .splash-bar {
        width: min(460px, 92%);
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .splash-bar > span {
        display: block;
        width: 45%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(59, 130, 246, 0), rgba(59, 130, 246, 1), rgba(16, 185, 129, 0.9), rgba(59, 130, 246, 0));
        filter: blur(0.2px);
        animation: splash-scan 1.2s ease-in-out infinite;
      }

      @keyframes splash-scan {
        0% { transform: translateX(-120%); opacity: 0.2; }
        40% { opacity: 1; }
        100% { transform: translateX(260%); opacity: 0.25; }
      }

      #splash.splash-exit {
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 420ms ease, transform 420ms ease;
        pointer-events: none;
      }
    </style>

    <script>
      (function () {
        var splash = document.getElementById('splash');
        if (!splash) return;

        // Splash longa só na vitrine: no /admin* atrasava login e parecia “tela preta”.
        var isAdmin = /^\/admin(\/|$)/i.test(window.location.pathname || '');
        var MIN_MS = isAdmin ? 200 : 5000;   // 5s na home (pedido); ~instantâneo no painel
        var MAX_MS = isAdmin ? 4000 : 10000;  // 10s na home (pedido)
        var startedAt = Date.now();
        var removed = false;

        function removeSplash() {
          if (removed) return;
          removed = true;
          splash.classList.add('splash-exit');
          window.setTimeout(function () {
            try { splash.remove(); } catch (e) {}
          }, 500);
        }

        function tryFinish() {
          var elapsed = Date.now() - startedAt;
          if (elapsed >= MIN_MS) removeSplash();
          else window.setTimeout(removeSplash, Math.max(0, MIN_MS - elapsed));
        }

        window.addEventListener('app:ready', tryFinish, { once: true });
        window.setTimeout(removeSplash, MAX_MS);
      })();
    </script>
